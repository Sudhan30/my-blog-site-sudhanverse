<svg viewBox="0 0 950 550" width="950" height="550" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="chatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="ollamaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="safetyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="userGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="schemaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="sseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#60a5fa"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="950" height="550" rx="16" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
    <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.05"/>
  </pattern>
  <rect width="950" height="550" fill="url(#grid)"/>

  <!-- Title -->
  <text x="475" y="32" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="700">Data Agent Architecture — Text-to-SQL</text>
  <text x="475" y="52" text-anchor="middle" fill="#94a3b8" font-size="11">Ollama Tool Calling • Gemma3 12B • Read-Only Safety Layer</text>

  <!-- ========== USER ========== -->
  <g filter="url(#shadow)">
    <rect x="30" y="120" width="110" height="100" rx="12" fill="url(#userGrad)"/>
    <!-- Browser icon -->
    <rect x="50" y="135" width="50" height="35" rx="4" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.5"/>
    <rect x="53" y="138" width="44" height="4" rx="1" fill="#7c3aed"/>
    <circle cx="57" cy="140" r="1.5" fill="#ef4444"/>
    <circle cx="63" cy="140" r="1.5" fill="#fbbf24"/>
    <circle cx="69" cy="140" r="1.5" fill="#22c55e"/>
    <rect x="53" y="145" width="44" height="22" rx="2" fill="#3b0764"/>
    <text x="75" y="176" text-anchor="middle" fill="#e9d5ff" font-size="7">Chat UI</text>
    <text x="85" y="195" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">User</text>
    <text x="85" y="210" text-anchor="middle" fill="#c4b5fd" font-size="8">Natural Language</text>
  </g>

  <!-- ========== CHAT APP ========== -->
  <g filter="url(#shadow)">
    <rect x="195" y="90" width="160" height="160" rx="12" fill="url(#chatGrad)"/>
    <!-- Bun icon -->
    <g transform="translate(215, 105)">
      <ellipse cx="12" cy="10" rx="10" ry="7" fill="#fbf0df"/>
      <ellipse cx="12" cy="8" rx="8" ry="5" fill="#f5e6d3"/>
      <text x="12" y="12" text-anchor="middle" fill="#000" font-size="6" font-weight="bold">BUN</text>
    </g>
    <text x="260" y="115" fill="#ffffff" font-size="11" font-weight="600">Chat App</text>
    <text x="260" y="128" fill="#bfdbfe" font-size="8">Bun / Hono</text>

    <rect x="207" y="138" width="136" height="100" rx="6" fill="#1e3a8a" opacity="0.6"/>
    <text x="220" y="157" fill="#93c5fd" font-size="9" font-weight="500">Responsibilities:</text>
    <text x="220" y="173" fill="#93c5fd" font-size="8">Build system prompt</text>
    <text x="220" y="187" fill="#93c5fd" font-size="8">Inject schema context</text>
    <text x="220" y="201" fill="#93c5fd" font-size="8">Tool call dispatch</text>
    <text x="220" y="215" fill="#93c5fd" font-size="8">SSE streaming</text>
    <text x="220" y="229" fill="#93c5fd" font-size="8">Max 3 tool rounds</text>
  </g>

  <!-- ========== SCHEMA CONTEXT ========== -->
  <g filter="url(#shadow)">
    <rect x="195" y="280" width="160" height="65" rx="10" fill="url(#schemaGrad)"/>
    <!-- Document icon -->
    <g transform="translate(210, 290)">
      <rect width="16" height="20" rx="2" fill="#c7d2fe" stroke="#818cf8"/>
      <line x1="4" y1="6" x2="12" y2="6" stroke="#4f46e5" stroke-width="1.5"/>
      <line x1="4" y1="10" x2="12" y2="10" stroke="#4f46e5" stroke-width="1.5"/>
      <line x1="4" y1="14" x2="10" y2="14" stroke="#4f46e5" stroke-width="1.5"/>
    </g>
    <text x="240" y="303" fill="#ffffff" font-size="10" font-weight="600">Schema Context</text>
    <text x="240" y="318" fill="#c7d2fe" font-size="8">Table definitions</text>
    <text x="240" y="332" fill="#c7d2fe" font-size="8">SQL examples (few-shot)</text>
  </g>

  <!-- ========== OLLAMA / GEMMA3 ========== -->
  <g filter="url(#shadow)">
    <rect x="415" y="90" width="170" height="160" rx="12" fill="url(#ollamaGrad)"/>
    <!-- Llama icon -->
    <g transform="translate(435, 100)">
      <ellipse cx="15" cy="18" rx="12" ry="10" fill="#fef3c7"/>
      <ellipse cx="15" cy="8" rx="8" ry="7" fill="#fef3c7"/>
      <ellipse cx="10" cy="5" rx="2" ry="4" fill="#fef3c7"/>
      <ellipse cx="20" cy="5" rx="2" ry="4" fill="#fef3c7"/>
      <circle cx="12" cy="8" r="1.5" fill="#78350f"/>
      <circle cx="18" cy="8" r="1.5" fill="#78350f"/>
    </g>
    <text x="475" y="115" fill="#ffffff" font-size="11" font-weight="600">Ollama</text>
    <text x="475" y="128" fill="#fef3c7" font-size="8">Gemma3 12B</text>

    <rect x="427" y="138" width="146" height="100" rx="6" fill="#78350f" opacity="0.5"/>
    <text x="440" y="157" fill="#fde68a" font-size="9" font-weight="500">Decision Engine:</text>
    <text x="440" y="175" fill="#fde68a" font-size="8">Regular chat response</text>
    <text x="440" y="189" fill="#fde68a" font-size="8">  OR</text>
    <text x="440" y="203" fill="#fbbf24" font-size="8" font-weight="600">Tool call: query_*_db</text>
    <text x="440" y="220" fill="#fde68a" font-size="8">Summarize results as</text>
    <text x="440" y="234" fill="#fde68a" font-size="8">natural language</text>
  </g>

  <!-- ========== SAFETY LAYER ========== -->
  <g filter="url(#shadow)">
    <rect x="640" y="90" width="150" height="160" rx="12" fill="url(#safetyGrad)"/>
    <!-- Shield icon -->
    <g transform="translate(690, 100)">
      <path d="M 15 0 L 30 8 L 30 20 C 30 28 22 34 15 36 C 8 34 0 28 0 20 L 0 8 Z" fill="#fca5a5" stroke="#ffffff" stroke-width="1.5"/>
      <path d="M 10 18 L 14 22 L 22 13" stroke="#dc2626" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
    <text x="715" y="145" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">Safety Layer</text>

    <rect x="652" y="155" width="126" height="85" rx="6" fill="#7f1d1d" opacity="0.6"/>
    <text x="665" y="175" fill="#fca5a5" font-size="8" font-weight="600">Read-only DB user</text>
    <text x="665" y="192" fill="#fca5a5" font-size="8" font-weight="600">SQL validation</text>
    <text x="672" y="205" fill="#fecaca" font-size="7">SELECT/WITH only</text>
    <text x="672" y="217" fill="#fecaca" font-size="7">Block DROP/ALTER/DELETE</text>
    <text x="665" y="232" fill="#fca5a5" font-size="8" font-weight="600">5s timeout + LIMIT 100</text>
  </g>

  <!-- ========== BLOG DB ========== -->
  <g filter="url(#shadow)">
    <rect x="645" y="310" width="140" height="105" rx="10" fill="url(#dbGrad)"/>
    <!-- DB cylinder icon -->
    <g transform="translate(660, 320)">
      <ellipse cx="12" cy="5" rx="10" ry="4" fill="#a7f3d0" stroke="#059669"/>
      <rect x="2" y="5" width="20" height="14" fill="#a7f3d0" stroke="none"/>
      <ellipse cx="12" cy="19" rx="10" ry="4" fill="#a7f3d0" stroke="#059669"/>
      <line x1="2" y1="5" x2="2" y2="19" stroke="#059669"/>
      <line x1="22" y1="5" x2="22" y2="19" stroke="#059669"/>
    </g>
    <text x="700" y="340" fill="#ffffff" font-size="10" font-weight="600">Blog DB</text>
    <text x="700" y="353" fill="#a7f3d0" font-size="8">PostgreSQL</text>

    <text x="660" y="372" fill="#6ee7b7" font-size="8">comments</text>
    <text x="660" y="385" fill="#6ee7b7" font-size="8">likes</text>
    <text x="660" y="398" fill="#6ee7b7" font-size="8">comment_summaries</text>
  </g>

  <!-- ========== OPERATIONAL DB ========== -->
  <g filter="url(#shadow)">
    <rect x="800" y="310" width="140" height="105" rx="10" fill="url(#dbGrad)"/>
    <!-- DB cylinder icon -->
    <g transform="translate(815, 320)">
      <ellipse cx="12" cy="5" rx="10" ry="4" fill="#a7f3d0" stroke="#059669"/>
      <rect x="2" y="5" width="20" height="14" fill="#a7f3d0" stroke="none"/>
      <ellipse cx="12" cy="19" rx="10" ry="4" fill="#a7f3d0" stroke="#059669"/>
      <line x1="2" y1="5" x2="2" y2="19" stroke="#059669"/>
      <line x1="22" y1="5" x2="22" y2="19" stroke="#059669"/>
    </g>
    <text x="855" y="340" fill="#ffffff" font-size="10" font-weight="600">Operational DB</text>
    <text x="855" y="353" fill="#a7f3d0" font-size="8">TimescaleDB</text>

    <text x="815" y="372" fill="#6ee7b7" font-size="8">metrics</text>
    <text x="815" y="385" fill="#6ee7b7" font-size="8">snapshots</text>
    <text x="815" y="398" fill="#6ee7b7" font-size="8">performance data</text>
  </g>

  <!-- ========== ARROWS ========== -->

  <!-- 1. User to Chat App -->
  <path d="M 140 170 L 185 170" stroke="#a78bfa" stroke-width="2" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="162" y="163" text-anchor="middle" fill="#a78bfa" font-size="7">question</text>

  <!-- 2. Schema Context to Chat App -->
  <path d="M 275 280 L 275 260" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="4,3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="290" y="273" fill="#818cf8" font-size="7">inject</text>

  <!-- 3. Chat App to Ollama -->
  <path d="M 355 150 L 405 150" stroke="#fbbf24" stroke-width="2" fill="none" marker-end="url(#arrowYellow)"/>
  <text x="380" y="143" text-anchor="middle" fill="#fbbf24" font-size="7">prompt +</text>
  <text x="380" y="153" text-anchor="middle" fill="#fbbf24" font-size="7">tools</text>

  <!-- 4. Ollama to Safety (tool call) -->
  <path d="M 585 170 L 630 170" stroke="#f87171" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <text x="607" y="163" text-anchor="middle" fill="#f87171" font-size="7">SQL</text>

  <!-- 5. Safety to Blog DB -->
  <path d="M 715 250 L 715 300" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>

  <!-- 6. Safety to Operational DB -->
  <path d="M 750 250 L 870 300" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="790" y="265" text-anchor="middle" fill="#34d399" font-size="7">validated query</text>

  <!-- 7. DB results back to Ollama (curved path) -->
  <path d="M 645 380 L 520 380 L 520 260" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowGray)"/>
  <text x="570" y="373" text-anchor="middle" fill="#94a3b8" font-size="7">results</text>

  <!-- 8. Ollama response back to Chat App -->
  <path d="M 415 210 L 355 210" stroke="#22d3ee" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="385" y="225" text-anchor="middle" fill="#22d3ee" font-size="7">answer</text>

  <!-- 9. Chat App SSE back to User -->
  <path d="M 195 200 L 140 200" stroke="#22d3ee" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="167" y="213" text-anchor="middle" fill="#22d3ee" font-size="7">SSE stream</text>

  <!-- ========== FLOW NUMBERS ========== -->
  <g font-size="9" font-weight="700">
    <circle cx="162" cy="170" r="8" fill="#8b5cf6"/>
    <text x="162" y="173" text-anchor="middle" fill="#ffffff" font-size="8">1</text>

    <circle cx="380" cy="142" r="8" fill="#3b82f6"/>
    <text x="380" y="145" text-anchor="middle" fill="#ffffff" font-size="8">2</text>

    <circle cx="607" cy="170" r="8" fill="#f59e0b"/>
    <text x="607" y="173" text-anchor="middle" fill="#ffffff" font-size="8">3</text>

    <circle cx="715" cy="280" r="8" fill="#ef4444"/>
    <text x="715" y="283" text-anchor="middle" fill="#ffffff" font-size="8">4</text>

    <circle cx="570" cy="380" r="8" fill="#10b981"/>
    <text x="570" y="383" text-anchor="middle" fill="#ffffff" font-size="8">5</text>

    <circle cx="385" cy="218" r="8" fill="#06b6d4"/>
    <text x="385" y="221" text-anchor="middle" fill="#ffffff" font-size="8">6</text>

    <circle cx="167" cy="200" r="8" fill="#06b6d4"/>
    <text x="167" y="203" text-anchor="middle" fill="#ffffff" font-size="8">7</text>
  </g>

  <!-- ========== FLOW DESCRIPTION ========== -->
  <rect x="30" y="445" width="890" height="90" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="475" y="468" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Request Flow</text>

  <g font-size="9" fill="#94a3b8">
    <circle cx="55" cy="490" r="7" fill="#8b5cf6"/>
    <text x="55" y="493" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">1</text>
    <text x="68" y="493" fill="#cbd5e1" font-size="8">User asks question</text>

    <circle cx="195" cy="490" r="7" fill="#3b82f6"/>
    <text x="195" y="493" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">2</text>
    <text x="208" y="493" fill="#cbd5e1" font-size="8">Build prompt + schema</text>

    <circle cx="350" cy="490" r="7" fill="#f59e0b"/>
    <text x="350" y="493" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">3</text>
    <text x="363" y="493" fill="#cbd5e1" font-size="8">Gemma3 tool call</text>

    <circle cx="490" cy="490" r="7" fill="#ef4444"/>
    <text x="490" y="493" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">4</text>
    <text x="503" y="493" fill="#cbd5e1" font-size="8">Validate + execute SQL</text>

    <circle cx="55" cy="515" r="7" fill="#10b981"/>
    <text x="55" y="518" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">5</text>
    <text x="68" y="518" fill="#cbd5e1" font-size="8">Results to Gemma3</text>

    <circle cx="195" cy="515" r="7" fill="#06b6d4"/>
    <text x="195" y="518" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">6</text>
    <text x="208" y="518" fill="#cbd5e1" font-size="8">Natural language answer</text>

    <circle cx="350" cy="515" r="7" fill="#06b6d4"/>
    <text x="350" y="518" text-anchor="middle" fill="#fff" font-size="7" font-weight="700">7</text>
    <text x="363" y="518" fill="#cbd5e1" font-size="8">SSE stream to user</text>

    <!-- Separator -->
    <line x1="640" y1="480" x2="640" y2="525" stroke="#334155" stroke-width="1"/>

    <!-- Key highlights -->
    <text x="660" y="493" fill="#f87171" font-size="8" font-weight="600">Read-only connections</text>
    <text x="660" y="508" fill="#fbbf24" font-size="8" font-weight="600">SQL validation layer</text>
    <text x="660" y="523" fill="#34d399" font-size="8" font-weight="600">5s timeout + LIMIT 100</text>
  </g>
</svg>
